# ─────────────────────────────────────────────────────────────────────
#  Google Cloud Build — CI/CD Pipeline
#  Project: wafer-214c9 | Region: us-central1
#  Service: rukn-al-coupons
# ─────────────────────────────────────────────────────────────────────
#
#  Setup in Cloud Build Console:
#   1. Connect your GitHub repository
#   2. Create a trigger on branch: main
#   3. Build configuration: Cloud Build configuration file (cloudbuild.yaml)
#   No substitution variables needed — all values are pre-filled below.
# ─────────────────────────────────────────────────────────────────────

steps:
  # Step 1: Install dependencies using Node.js
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']
    
  # Step 2: Build the Next.js application (has access to Cloud Build credentials)
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      - 'NEXT_TELEMETRY_DISABLED=1'
      - 'FIREBASE_PROJECT_ID=$PROJECT_ID'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'

  # Step 3: Build the Docker image containing only the built standalone output
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/wafer-214c9/rukn-al-coupons:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/wafer-214c9/rukn-al-coupons:latest'
      - '.'
    timeout: '1200s'

  # Step 2: Push to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/wafer-214c9/rukn-al-coupons'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'rukn-al-coupons'
      - '--image=gcr.io/wafer-214c9/rukn-al-coupons:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=100'
      - '--timeout=60'

images:
  - 'gcr.io/wafer-214c9/rukn-al-coupons:$COMMIT_SHA'
  - 'gcr.io/wafer-214c9/rukn-al-coupons:latest'

timeout: '1500s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
