# ─────────────────────────────────────────────────────────────────────
#  Google Cloud Build — Simplified CI/CD Pipeline
#  Project: wafer-214c9 | Region: us-central1
#  Service: rukn-al-coupons
# ─────────────────────────────────────────────────────────────────────

steps:
  # Step 1: Build the Docker image (Multi-stage handles Next.js build internally)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/wafer-214c9/rukn-al-coupons:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/wafer-214c9/rukn-al-coupons:latest'
      - '--build-arg'
      - 'FIREBASE_PROJECT_ID=wafer-214c9'
      - '--build-arg'
      - 'GOOGLE_CLOUD_PROJECT=wafer-214c9'
      - '.'
    timeout: '1500s'

  # Step 2: Push to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/wafer-214c9/rukn-al-coupons'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'rukn-al-coupons'
      - '--image=gcr.io/wafer-214c9/rukn-al-coupons:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=100'
      - '--timeout=60'

images:
  - 'gcr.io/wafer-214c9/rukn-al-coupons:$COMMIT_SHA'
  - 'gcr.io/wafer-214c9/rukn-al-coupons:latest'

timeout: '1800s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
